<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 50%, #0d0d0d 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 2.2rem;
            color: #ff3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 51, 51, 0.1);
            border: 2px solid rgba(255, 51, 51, 0.4);
            color: #ff6666;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 51, 51, 0.2);
            border-color: #ff3333;
        }

        .back-link-btn {
            color: #ff6666;
            background: rgba(255, 51, 51, 0.1);
            border: 2px solid rgba(255, 51, 51, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link-btn:hover {
            background: rgba(255, 51, 51, 0.2);
            transform: translateX(-5px);
        }

        .upload-section {
            background: linear-gradient(145deg, #252525 0%, #1e1e1e 100%);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid rgba(255, 51, 51, 0.1);
        }

        .upload-section h2 {
            color: #ff3333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0b0;
            font-weight: 600;
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 1rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #ff3333;
        }

        textarea { min-height: 100px; resize: vertical; }

        input[type="file"] {
            padding: 10px;
            border: 2px dashed #444;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 51, 51, 0.5);
        }

        button[type="submit"]:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .file-info {
            margin-top: 10px;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 8px;
            border-left: 4px solid #ff3333;
            display: none;
        }

        .file-info.show { display: block; }

        .progress-bar {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 10px;
            display: none;
        }

        .progress-bar.show { display: block; }

        .progress-bar-fill {
            width: 100%;
            height: 25px;
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            line-height: 25px;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            width: 0%;
            transition: width 0.2s;
        }

        .preview-thumb {
            margin-top: 10px;
            width: 100px;
            height: 100px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            border: 2px solid #333;
        }

        .preview-thumb.show { display: block; }

        .preview-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .admin-project-card {
            background: linear-gradient(145deg, #252525 0%, #1e1e1e 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 51, 51, 0.1);
        }

        .admin-project-header {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .admin-project-preview {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 2rem;
            overflow: hidden;
            flex-shrink: 0;
        }

        .admin-project-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .admin-project-info { flex: 1; }

        .admin-project-info h3 {
            color: #e0e0e0;
            margin-bottom: 5px;
        }

        .admin-project-info p {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .project-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #666;
            flex-wrap: wrap;
        }

        .admin-actions {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }

        .btn-edit {
            background: #4a5568;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-edit:hover { background: #ff3333; }

        .btn-delete {
            background: #742a2a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-delete:hover { background: #c53030; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: linear-gradient(145deg, #252525 0%, #1e1e1e 100%);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 51, 51, 0.2);
        }

        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #666;
        }

        .close:hover { color: #ff3333; }

        .notification {
            position: fixed;
            top: 20px; right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 2000;
        }

        .notification.success { background: #276749; }
        .notification.error { background: #c53030; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .admin-project-header { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1><i class="fas fa-cog"></i> Панель управления</h1>
                <div id="adminAuthSection"></div>
            </div>
            <button onclick="goToSite()" class="back-link-btn">
                <i class="fas fa-arrow-left"></i> На сайт
            </button>
        </header>

        <div class="upload-section">
            <h2><i class="fas fa-upload"></i> Добавить файл</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Название проекта</label>
                    <input type="text" id="fileName" placeholder="Например: Мой Супер-App">
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="fileDescription" placeholder="Описание функций..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>ПК версия (EXE)</label>
                        <input type="file" name="file" id="fileInput" accept=".exe">
                        <div class="file-info" id="fileInfo"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Мобильная версия (APK)</label>
                        <input type="file" name="mobileFile" id="mobileFileInput" accept=".apk">
                        <div class="file-info" id="mobileFileInfo"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Превью (скриншот/иконка)</label>
                    <input type="file" name="preview" id="previewInput" accept="image/*">
                    <div class="preview-thumb" id="previewThumb"></div>
                </div>

                <div style="background: rgba(255, 51, 51, 0.1); border: 1px solid rgba(255, 51, 51, 0.3); padding: 12px; border-radius: 8px; margin: 15px 0; color: #b0b0b0; font-size: 0.9rem;">
                    <i class="fas fa-info-circle" style="color: #ff6666; margin-right: 8px;"></i>
                    <span id="fileRequirementText">Обязательно: загрузите хотя бы один файл (EXE или APK)</span>
                </div>

                <div class="progress-bar" id="progressBar">
                    <div class="progress-bar-fill" id="progressFill">0%</div>
                </div>

                <button type="submit" id="submitBtn">
                    <i class="fas fa-upload"></i> Загрузить файл
                </button>
            </form>
        </div>

        <div class="upload-section">
            <h2><i class="fas fa-link"></i> Добавить ссылку</h2>
            <form id="linkForm">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" name="name" placeholder="Название проекта" required>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea name="description" placeholder="Описание..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>URL ссылки *</label>
                        <input type="url" name="url" placeholder="https://example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Превью (опционально)</label>
                        <input type="file" name="preview" accept="image/*">
                    </div>
                </div>

                <button type="submit">
                    <i class="fas fa-plus"></i> Добавить ссылку
                </button>
            </form>
        </div>

        <div>
            <h2 style="color: #ff3333; margin-bottom: 20px;">
                <i class="fas fa-list"></i> Все проекты
            </h2>
            <div id="adminProjectsList">
                <div style="text-align: center; color: #666; padding: 40px;">Загрузка...</div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2 style="color: #ff3333; margin-bottom: 20px;">
                <i class="fas fa-edit"></i> Редактировать проект
            </h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="editName" required>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="editDescription"></textarea>
                </div>

                <div id="editUrlGroup" class="form-group" style="display: none;">
                    <label>URL</label>
                    <input type="url" id="editUrl">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Текущее превью</label>
                        <div id="currentPreview" style="width: 150px; height: 150px; background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #555;"></div>
                    </div>
                    <div class="form-group">
                        <label>Новое превью (заменить)</label>
                        <input type="file" id="editPreview" accept="image/*">
                    </div>
                </div>

                <button type="submit">
                    <i class="fas fa-save"></i> Сохранить изменения
                </button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function goToSite() {
            window.location.href = '/';
        }

        async function checkAdminAuth() {
            try {
                const response = await fetch('/api/me');
                const data = await response.json();
                
                if (!data.authenticated || !data.isAdmin) {
                    window.location.href = '/';
                    return;
                }
                
                document.getElementById('adminAuthSection').innerHTML = `
                    <span style="color: #ff6666; margin-right: 15px;">👑 ${data.username}</span>
                    <a href="/settings.html" class="btn-secondary" style="margin-right: 10px;">
                        <i class="fas fa-cog"></i> Настройки
                    </a>
                    <button onclick="logout()" class="btn-secondary">
                        <i class="fas fa-sign-out-alt"></i> Выйти
                    </button>
                `;
                
                loadAdminProjects();
            } catch (error) {
                window.location.href = '/';
            }
        }

        function logout() {
            fetch('/api/logout', { method: 'POST' }).then(() => {
                window.location.href = '/';
            });
        }

        // Валидация файлов при изменении
        const updateFileValidation = () => {
            const pcFile = document.getElementById('fileInput').files[0];
            const apkFile = document.getElementById('mobileFileInput').files[0];
            const submitBtn = document.getElementById('submitBtn');
            const requirementText = document.getElementById('fileRequirementText');
            
            const hasAtLeastOne = !!(pcFile || apkFile);
            
            if (hasAtLeastOne) {
                if (pcFile && apkFile) {
                    requirementText.innerHTML = '<i class="fas fa-check-circle" style="color: #33ff33; margin-right: 8px;"></i>Оба файла выбраны (EXE + APK)';
                } else if (pcFile) {
                    requirementText.innerHTML = '<i class="fas fa-check-circle" style="color: #33ff33; margin-right: 8px;"></i>Выбран ПК файл (EXE)';
                } else {
                    requirementText.innerHTML = '<i class="fas fa-check-circle" style="color: #33ff33; margin-right: 8px;"></i>Выбран файл для телефона (APK)';
                }
                submitBtn.disabled = false;
            } else {
                requirementText.innerHTML = '<i class="fas fa-info-circle" style="color: #ff6666; margin-right: 8px;"></i>Обязательно: загрузите хотя бы один файл (EXE или APK)';
                submitBtn.disabled = true;
            }
        };

        document.getElementById('fileInput')?.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const info = document.getElementById('fileInfo');
            
            if (file) {
                const size = formatFileSize(file.size);
                info.innerHTML = `<strong>💻 ${file.name}</strong><br>📊 ${size}`;
                info.classList.add('show');
            } else {
                info.classList.remove('show');
            }
            updateFileValidation();
        });

        document.getElementById('mobileFileInput')?.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const info = document.getElementById('mobileFileInfo');
            
            if (file) {
                const size = formatFileSize(file.size);
                info.innerHTML = `<strong>📱 ${file.name}</strong><br>📊 ${size}`;
                info.classList.add('show');
            } else {
                info.classList.remove('show');
            }
            updateFileValidation();
        });

        // Превью
        document.getElementById('previewInput')?.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const thumb = document.getElementById('previewThumb');
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    thumb.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                    thumb.classList.add('show');
                };
                reader.readAsDataURL(file);
            }
        });

        // ЗАГРУЗКА ФАЙЛА (через сервер, сервер загружает в B2)
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const file = document.getElementById('fileInput').files[0];
            const mobileFile = document.getElementById('mobileFileInput').files[0];
            const previewFile = document.getElementById('previewInput').files[0];
            const name = document.getElementById('fileName')?.value || '';
            const description = document.getElementById('fileDescription')?.value || '';

            // Валидация: хотя бы один файл должен быть выбран
            if (!file && !mobileFile) {
                showNotification('❌ Выберите хотя бы один файл (EXE или APK)', 'error');
                return;
            }

            submitBtn.disabled = true;
            progressBar.classList.add('show');

            try {
                const formData = new FormData();
                formData.append('name', name);
                formData.append('description', description);
                
                if (file) formData.append('file', file);
                if (mobileFile) formData.append('mobileFile', mobileFile);
                if (previewFile) formData.append('preview', previewFile);

                const filesInfo = [];
                if (file) filesInfo.push('EXE');
                if (mobileFile) filesInfo.push('APK');

                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Загрузка...';

                const xhr = new XMLHttpRequest();
                
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        progressFill.style.width = percent + '%';
                        progressFill.textContent = percent + '%';
                        submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${percent}%`;
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        try {
                            const result = JSON.parse(xhr.responseText);
                            if (result.success) {
                                document.getElementById('uploadForm').reset();
                                document.getElementById('fileInfo').classList.remove('show');
                                document.getElementById('mobileFileInfo').classList.remove('show');
                                document.getElementById('previewThumb').classList.remove('show');
                                progressBar.classList.remove('show');
                                progressFill.style.width = '0%';
                                progressFill.textContent = '0%';
                                updateFileValidation();
                                showNotification(`✅ Файл(ы) загружены успешно! (${filesInfo.join(' + ')})`, 'success');
                                setTimeout(() => loadAdminProjects(), 1000);
                            } else {
                                throw new Error(result.error || 'Ошибка сохранения');
                            }
                        } catch (e) {
                            throw new Error('Ошибка парсинга ответа: ' + e.message);
                        }
                    } else if (xhr.status === 0) {
                        throw new Error('Таймаут или сервер недоступен');
                    } else {
                        throw new Error('Ошибка сервера: ' + xhr.status + ' ' + xhr.statusText);
                    }
                };

                xhr.ontimeout = () => {
                    throw new Error('Таймаут загрузки (сервер долго обрабатывает)');
                };

                xhr.open('POST', '/api/upload', true);
                xhr.timeout = 3600000; // 1 час таймаут (для файлов до 1GB)
                xhr.send(formData);
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('❌ ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-upload"></i> Загрузить файл';
            }
        });

        // Добавление ссылки
        document.getElementById('linkForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const button = e.target.querySelector('button[type="submit"]');
            const originalText = button.innerHTML;
            
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Добавление...';
            button.disabled = true;

            try {
                const response = await fetch('/api/link', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    e.target.reset();
                    showNotification('✅ Ссылка добавлена!', 'success');
                } else {
                    showNotification('❌ ' + result.error, 'error');
                }
            } catch (error) {
                showNotification('❌ Ошибка добавления', 'error');
            } finally {
                button.innerHTML = originalText;
                button.disabled = false;
            }
        });

        async function loadAdminProjects() {
    try {
        const response = await fetch('/api/projects');
        const projects = await response.json();
        displayAdminProjects(projects);
    } catch (error) {
        console.error('Ошибка:', error);
        // Повторяем через 3 секунды если сервер недоступен
        setTimeout(loadAdminProjects, 3000);
    }
}

        function displayAdminProjects(projects) {
            const container = document.getElementById('adminProjectsList');
            
            if (projects.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">Нет проектов</div>';
                return;
            }

            container.innerHTML = projects.map(project => {
                const isFile = project.type === 'file';
                const size = isFile ? formatFileSize(project.file_size) : 'Ссылка';
                
                let previewHtml;
                if (project.preview_path) {
                    previewHtml = `<img src="${project.preview_path}" alt="">`;
                } else {
                    const icon = isFile ? getFileIcon(project.original_name) : 'fa-link';
                    previewHtml = `<i class="fas ${icon}"></i>`;
                }

                return `
                    <div class="admin-project-card">
                        <div class="admin-project-header">
                            <div class="admin-project-preview">
                                ${previewHtml}
                            </div>
                            <div class="admin-project-info">
                                <h3>${escapeHtml(project.name)}</h3>
                                <p>${escapeHtml(project.description || 'Без описания')}</p>
                                <div class="project-meta">
                                    <span>${isFile ? '📁 ' + project.original_name : '🔗 Ссылка'}</span>
                                    <span>📊 ${size}</span>
                                    <span>⬇️ ${project.downloads || 0}</span>
                                    <span>📅 ${new Date(project.created_at).toLocaleDateString()}</span>
                                </div>
                            </div>
                        </div>
                        <div class="admin-actions">
                            <button class="btn-edit" onclick="editProject('${project.id}')">
                                <i class="fas fa-edit"></i> Редактировать
                            </button>
                            <button class="btn-delete" onclick="deleteProject('${project.id}')">
                                <i class="fas fa-trash"></i> Удалить
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        let editingProject = null;

        function editProject(id) {
            fetch('/api/projects').then(r => r.json()).then(projects => {
                const project = projects.find(p => p.id === id);
                if (!project) return;
                
                editingProject = project;
                
                document.getElementById('editId').value = project.id;
                document.getElementById('editName').value = project.name;
                document.getElementById('editDescription').value = project.description || '';
                
                const urlGroup = document.getElementById('editUrlGroup');
                if (project.type === 'link') {
                    urlGroup.style.display = 'block';
                    document.getElementById('editUrl').value = project.link_url || '';
                } else {
                    urlGroup.style.display = 'none';
                }
                
                const previewDiv = document.getElementById('currentPreview');
                if (project.preview_path) {
                    previewDiv.innerHTML = `<img src="${project.preview_path}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">`;
                } else {
                    const icon = project.type === 'file' ? getFileIcon(project.original_name) : 'fa-link';
                    previewDiv.innerHTML = `<i class="fas ${icon}"></i>`;
                }
                
                document.getElementById('editModal').classList.add('show');
            });
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editingProject = null;
        }

        document.getElementById('editForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('editId').value;
            const formData = new FormData();
            formData.append('name', document.getElementById('editName').value);
            formData.append('description', document.getElementById('editDescription').value);
            
            const url = document.getElementById('editUrl').value;
            if (url) formData.append('url', url);
            
            const previewFile = document.getElementById('editPreview').files[0];
            if (previewFile) formData.append('preview', previewFile);

            try {
                const response = await fetch(`/api/projects/${id}`, {
                    method: 'PUT',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    closeEditModal();
                    showNotification('✅ Изменения сохранены!', 'success');
                } else {
                    showNotification('❌ ' + result.error, 'error');
                }
            } catch (error) {
                showNotification('❌ Ошибка сохранения', 'error');
            }
        });

        async function deleteProject(id) {
            if (!confirm('❓ Удалить этот проект?')) return;

            try {
                const response = await fetch(`/api/projects/${id}`, { method: 'DELETE' });
                const result = await response.json();
                
                if (result.success) {
                    showNotification('✅ Удалено!', 'success');
                } else {
                    showNotification('❌ ' + result.error, 'error');
                }
            } catch (error) {
                showNotification('❌ Ошибка удаления', 'error');
            }
        }

        function formatFileSize(bytes) {
            if (!bytes) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function getFileIcon(filename) {
            if (!filename) return 'fa-file';
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'exe': 'fa-windows',
                'apk': 'fa-android',
                'ipa': 'fa-apple',
                'zip': 'fa-file-archive',
                'rar': 'fa-file-archive',
                'pdf': 'fa-file-pdf',
                'doc': 'fa-file-word',
                'docx': 'fa-file-word',
                'jpg': 'fa-file-image',
                'jpeg': 'fa-file-image',
                'png': 'fa-file-image',
                'mp4': 'fa-file-video',
                'mp3': 'fa-file-audio'
            };
            return icons[ext] || 'fa-file';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showNotification(text, type) {
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.innerHTML = text;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        socket.on('new_project', () => loadAdminProjects());
        socket.on('delete_project', () => loadAdminProjects());
        socket.on('update_project', () => loadAdminProjects());

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('show');
            }
        }

        checkAdminAuth();
    </script>
</body>
</html>
