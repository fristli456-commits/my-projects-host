<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ЧЁРНО-КРАСНАЯ ТЕМА */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            min-height: 100vh;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 2.2rem;
            color: #ff3333;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.3);
        }

        header p {
            color: #888;
            font-size: 1.1rem;
        }

        /* Кнопка "На сайт" */
        .back-link-btn {
            color: #ff6666;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 10px;
            transition: all 0.3s;
            background: rgba(255, 51, 51, 0.1);
            border: 2px solid rgba(255, 51, 51, 0.3);
            font-size: 1rem;
            margin-top: 15px;
            font-weight: 600;
        }

        .back-link-btn:hover {
            background: rgba(255, 51, 51, 0.2);
            border-color: #ff3333;
            color: #ff3333;
            transform: translateX(-5px);
        }

        /* Buttons */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 51, 51, 0.4);
            color: #ff6666;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 51, 51, 0.15);
            border-color: #ff3333;
            color: #ff3333;
        }

        /* Upload sections */
        .upload-section {
            background: linear-gradient(145deg, #252525 0%, #1e1e1e 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 51, 51, 0.1);
        }

        .upload-section h2 {
            margin-bottom: 25px;
            color: #ff3333;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #b0b0b0;
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .required {
            color: #ff3333;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
            background: #1a1a1a;
            color: #e0e0e0;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #ff3333;
            box-shadow: 0 0 0 3px rgba(255, 51, 51, 0.1);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        input[type="file"] {
            padding: 10px;
            border: 2px dashed #444;
            background: #1a1a1a;
            cursor: pointer;
            color: #888;
        }

        input[type="file"]:hover {
            border-color: #ff3333;
            background: #252525;
        }

        .file-info {
            margin-top: 10px;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 8px;
            border-left: 4px solid #ff3333;
            display: none;
            font-size: 0.9rem;
            color: #b0b0b0;
        }

        .file-info.show {
            display: block;
        }

        .preview-thumb {
            margin-top: 10px;
            width: 100px;
            height: 100px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            border: 2px solid #333;
        }

        .preview-thumb.show {
            display: block;
        }

        .preview-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(255, 51, 51, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 51, 51, 0.5);
        }

        /* Projects list */
        .projects-list h2 {
            color: #ff3333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.2);
        }

        .admin-project-card {
            background: linear-gradient(145deg, #252525 0%, #1e1e1e 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 51, 51, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .admin-project-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 51, 51, 0.15);
            border-color: rgba(255, 51, 51, 0.2);
        }

        .admin-project-header {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .admin-project-preview {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background: #1a1a1a;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 2rem;
            border: 2px solid #333;
            overflow: hidden;
        }

        .admin-project-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .admin-project-info {
            flex: 1;
        }

        .admin-project-info h3 {
            margin-bottom: 5px;
            color: #e0e0e0;
        }

        .admin-project-info p {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .project-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #666;
            flex-wrap: wrap;
        }

        .admin-actions {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }

        .btn-edit {
            background: #4a5568;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .btn-edit:hover {
            background: #ff3333;
            transform: scale(1.05);
        }

        .btn-delete {
            background: #742a2a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #c53030;
            transform: scale(1.05);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(145deg, #252525 0%, #1e1e1e 100%);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            position: relative;
            animation: slideUp 0.3s;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 51, 51, 0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .modal-large {
            max-width: 700px;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #666;
            transition: color 0.3s;
        }

        .close:hover {
            color: #ff3333;
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #ff3333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .current-preview {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            border: 2px dashed #444;
        }

        .current-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Utilities */
        .loading {
            text-align: center;
            color: #ff6666;
            font-size: 1.2rem;
            padding: 60px;
        }

        .empty {
            text-align: center;
            color: #666;
            padding: 60px;
            font-size: 1.1rem;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            animation: slideInRight 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .notification.success { background: #276749; }
        .notification.error { background: #c53030; }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .header-top {
                flex-direction: column;
                text-align: center;
            }
            
            header h1 {
                font-size: 1.8rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .admin-project-header {
                flex-direction: column;
            }
            
            .admin-project-preview {
                width: 100%;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1><i class="fas fa-cog"></i> Панель управления</h1>
                <div id="adminAuthSection">
                    <!-- Здесь будет имя пользователя и кнопки -->
                </div>
            </div>
            <button onclick="goToSite()" class="back-link-btn">
    <i class="fas fa-arrow-left"></i> На сайт
</button>
        </header>

        <div class="upload-section">
            <h2><i class="fas fa-upload"></i> Добавить файл</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Название проекта</label>
                    <input type="text" name="name" placeholder="Например: Мой Супер-App" required>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea name="description" placeholder="Описание функций..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Файл приложения <span class="required">*</span></label>
                        <input type="file" name="file" id="fileInput" required>
                        <div class="file-info" id="fileInfo"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Превью (скриншот/иконка)</label>
                        <input type="file" name="preview" id="previewInput" accept="image/*">
                        <div class="preview-thumb" id="previewThumb"></div>
                    </div>
                </div>

                <button type="submit"><i class="fas fa-upload"></i> Загрузить файл</button>
            </form>
        </div>

        <div class="upload-section">
            <h2><i class="fas fa-link"></i> Добавить ссылку</h2>
            <form id="linkForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" name="name" placeholder="Название проекта" required>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea name="description" placeholder="Описание..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>URL ссылки <span class="required">*</span></label>
                        <input type="url" name="url" placeholder="https://example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Превью (опционально)</label>
                        <input type="file" name="preview" accept="image/*">
                    </div>
                </div>

                <button type="submit"><i class="fas fa-plus"></i> Добавить ссылку</button>
            </form>
        </div>

        <div class="projects-list">
            <h2><i class="fas fa-list"></i> Все проекты</h2>
            <div id="adminProjectsList">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно редактирования -->
    <div id="editModal" class="modal">
        <div class="modal-content modal-large">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2><i class="fas fa-edit"></i> Редактировать проект</h2>
            <form id="editForm" enctype="multipart/form-data">
                <input type="hidden" id="editId">
                
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="editName" required>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="editDescription"></textarea>
                </div>

                <div id="editUrlGroup" class="form-group" style="display: none;">
                    <label>URL</label>
                    <input type="url" id="editUrl">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Текущее превью</label>
                        <div id="currentPreview" class="current-preview"></div>
                    </div>
                    <div class="form-group">
                        <label>Новое превью (заменить)</label>
                        <input type="file" name="preview" accept="image/*">
                    </div>
                </div>

                <button type="submit"><i class="fas fa-save"></i> Сохранить изменения</button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // ПЕРЕХОД НА САЙТ - ГЛАВНАЯ ФУНКЦИЯ
        function goToSite() {
    window.location.href = '/';
}

        // Проверка авторизации
        async function checkAdminAuth() {
            try {
                const response = await fetch('/api/me');
                const data = await response.json();
                
                if (!data.authenticated || !data.isAdmin) {
                    window.location.href = '/';
                    return;
                }
                
                document.getElementById('adminAuthSection').innerHTML = `
                    <span style="color: #ff6666; margin-right: 15px; font-weight: 600;">👑 ${data.username}</span>
                    <a href="/settings.html" class="btn-secondary" style="margin-right: 10px; text-decoration: none;">
                        <i class="fas fa-cog"></i> Настройки
                    </a>
                    <button onclick="logout()" class="btn-secondary">
                        <i class="fas fa-sign-out-alt"></i> Выйти
                    </button>
                `;
                
                loadAdminProjects();
            } catch (error) {
                window.location.href = '/';
            }
        }

        function logout() {
            fetch('/api/logout', { method: 'POST' }).then(() => {
                window.location.href = '/';
            });
        }

        // Превью файла
        document.getElementById('previewInput')?.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const thumb = document.getElementById('previewThumb');
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    thumb.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                    thumb.classList.add('show');
                };
                reader.readAsDataURL(file);
            }
        });

        // Инфо о файле
        document.getElementById('fileInput')?.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const info = document.getElementById('fileInfo');
            
            if (file) {
                info.innerHTML = `
                    <strong>📁 ${file.name}</strong><br>
                    📊 ${formatFileSize(file.size)}<br>
                    📅 ${file.type || 'Неизвестный тип'}
                `;
                info.classList.add('show');
            }
        });

        // Загрузка файла
        document.getElementById('uploadForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const button = e.target.querySelector('button[type="submit"]');
            const originalText = button.innerHTML;
            
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Загрузка...';
            button.disabled = true;

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    e.target.reset();
                    document.getElementById('fileInfo').classList.remove('show');
                    document.getElementById('previewThumb').classList.remove('show');
                    showNotification('✅ Файл загружен успешно!', 'success');
                } else {
                    showNotification('❌ ' + result.error, 'error');
                }
            } catch (error) {
                showNotification('❌ Ошибка загрузки', 'error');
            } finally {
                button.innerHTML = originalText;
                button.disabled = false;
            }
        });

        // Добавление ссылки
        document.getElementById('linkForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const button = e.target.querySelector('button[type="submit"]');
            const originalText = button.innerHTML;
            
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Добавление...';
            button.disabled = true;

            try {
                const response = await fetch('/api/link', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    e.target.reset();
                    showNotification('✅ Ссылка добавлена!', 'success');
                } else {
                    showNotification('❌ ' + result.error, 'error');
                }
            } catch (error) {
                showNotification('❌ Ошибка добавления', 'error');
            } finally {
                button.innerHTML = originalText;
                button.disabled = false;
            }
        });

        // Загрузка списка проектов
        async function loadAdminProjects() {
            try {
                const response = await fetch('/api/projects');
                const projects = await response.json();
                displayAdminProjects(projects);
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        function displayAdminProjects(projects) {
            const container = document.getElementById('adminProjectsList');
            
            if (projects.length === 0) {
                container.innerHTML = '<div class="empty">Нет проектов</div>';
                return;
            }

            container.innerHTML = projects.map(project => {
                const isFile = project.type === 'file';
                const size = isFile ? formatFileSize(project.file_size) : 'Ссылка';
                
                let previewHtml;
                if (project.preview_path) {
                    previewHtml = `<img src="${project.preview_path}" alt="">`;
                } else {
                    const icon = isFile ? getFileIcon(project.original_name) : 'fa-link';
                    previewHtml = `<i class="fas ${icon}"></i>`;
                }

                return `
                    <div class="admin-project-card">
                        <div class="admin-project-header">
                            <div class="admin-project-preview">
                                ${previewHtml}
                            </div>
                            <div class="admin-project-info">
                                <h3>${escapeHtml(project.name)}</h3>
                                <p>${escapeHtml(project.description || 'Без описания')}</p>
                                <div class="project-meta">
                                    <span>${isFile ? '📁 ' + project.original_name : '🔗 Ссылка'}</span>
                                    <span>📊 ${size}</span>
                                    <span>⬇️ ${project.downloads || 0}</span>
                                    <span>📅 ${new Date(project.created_at).toLocaleDateString()}</span>
                                </div>
                            </div>
                        </div>
                        <div class="admin-actions">
                            <button class="btn-edit" onclick="editProject('${project.id}')">
                                <i class="fas fa-edit"></i> Редактировать
                            </button>
                            <button class="btn-delete" onclick="deleteProject('${project.id}')">
                                <i class="fas fa-trash"></i> Удалить
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Редактирование
        let editingProject = null;

        function editProject(id) {
            fetch('/api/projects').then(r => r.json()).then(projects => {
                const project = projects.find(p => p.id === id);
                if (!project) return;
                
                editingProject = project;
                
                document.getElementById('editId').value = project.id;
                document.getElementById('editName').value = project.name;
                document.getElementById('editDescription').value = project.description || '';
                
                const urlGroup = document.getElementById('editUrlGroup');
                if (project.type === 'link') {
                    urlGroup.style.display = 'block';
                    document.getElementById('editUrl').value = project.link_url || '';
                } else {
                    urlGroup.style.display = 'none';
                }
                
                const previewDiv = document.getElementById('currentPreview');
                if (project.preview_path) {
                    previewDiv.innerHTML = `<img src="${project.preview_path}" alt="">`;
                } else {
                    const icon = project.type === 'file' ? getFileIcon(project.original_name) : 'fa-link';
                    previewDiv.innerHTML = `<i class="fas ${icon}"></i>`;
                }
                
                document.getElementById('editModal').classList.add('show');
            });
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editingProject = null;
        }

        document.getElementById('editForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('editId').value;
            const formData = new FormData();
            formData.append('name', document.getElementById('editName').value);
            formData.append('description', document.getElementById('editDescription').value);
            
            const url = document.getElementById('editUrl').value;
            if (url) formData.append('url', url);
            
            const previewFile = e.target.querySelector('input[type="file"]').files[0];
            if (previewFile) formData.append('preview', previewFile);

            try {
                const response = await fetch(`/api/projects/${id}`, {
                    method: 'PUT',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    closeEditModal();
                    showNotification('✅ Изменения сохранены!', 'success');
                } else {
                    showNotification('❌ ' + result.error, 'error');
                }
            } catch (error) {
                showNotification('❌ Ошибка сохранения', 'error');
            }
        });

        // Удаление
        async function deleteProject(id) {
            if (!confirm('❓ Удалить этот проект?')) return;

            try {
                const response = await fetch(`/api/projects/${id}`, { method: 'DELETE' });
                const result = await response.json();
                
                if (result.success) {
                    showNotification('✅ Удалено!', 'success');
                } else {
                    showNotification('❌ ' + result.error, 'error');
                }
            } catch (error) {
                showNotification('❌ Ошибка удаления', 'error');
            }
        }

        // Утилиты
        function formatFileSize(bytes) {
            if (!bytes) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function getFileIcon(filename) {
            if (!filename) return 'fa-file';
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'exe': 'fa-windows',
                'apk': 'fa-android',
                'ipa': 'fa-apple',
                'zip': 'fa-file-archive',
                'rar': 'fa-file-archive',
                'pdf': 'fa-file-pdf',
                'doc': 'fa-file-word',
                'docx': 'fa-file-word',
                'jpg': 'fa-file-image',
                'jpeg': 'fa-file-image',
                'png': 'fa-file-image',
                'mp4': 'fa-file-video',
                'mp3': 'fa-file-audio'
            };
            return icons[ext] || 'fa-file';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showNotification(text, type) {
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.innerHTML = text;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // Real-time
        socket.on('new_project', () => loadAdminProjects());
        socket.on('delete_project', () => loadAdminProjects());
        socket.on('update_project', () => loadAdminProjects());

        // Закрытие модалок
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('show');
            }
        }

        // Инициализация
        checkAdminAuth();
    </script>
</body>
</html>
